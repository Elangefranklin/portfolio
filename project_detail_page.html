<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Detail Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chivo:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="components/navbar.css" />
    <link rel="stylesheet" href="components/footer.css" />
    <link rel="stylesheet" href="Styles.css" />
    <link rel="stylesheet" href="root.css" />
    <link rel="stylesheet" href="proect_detail_page.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>
    <main>
      <section class="project_detail_page_intro_section">
        <div class="project_detail_page_bg_container">
          <img
            class="project_detail_page_bg_img"
            id="detail-hero-img"
            src=""
            alt="Project background"
          />
          <div class="project_detail_page_bg_overlay"></div>
        </div>
        <div class="project_detail_page_intro_container">
          <div class="project_detail_page_title_container">
            <h1 class="project_detail_page_title" id="detail-title"></h1>
            <p class="project_detail_page_subtitle" id="detail-subtitle"></p>
          </div>
        </div>
      </section>

      <section class="project_detail_page_info_section">
        <div class="project_detail_page_info_container">
          <div class="project_info_item">
            <span class="project_info_label">År:</span>
            <span class="project_info_value" id="detail-year"></span>
          </div>
          <div class="project_info_item">
            <span class="project_info_label">Arbetstyp:</span>
            <span class="project_info_value" id="detail-workType"></span>
          </div>
          <div class="project_info_item">
            <span class="project_info_label">Verktyg:</span>
            <span class="project_info_value" id="detail-tools"></span>
          </div>
        </div>
      </section>

      <section class="project_background_section">
        <div class="project_background_container">
          <div class="project_background_content">
            <h2 class="project_background_title" id="detail-bg-title"></h2>
            <p class="project_background_text" id="detail-bg-text"></p>
          </div>
          <div class="project_background_media">
            <img
              class="project_background_img"
              id="detail-bg-img"
              src=""
              alt="Project background image representation"
            />
          </div>
        </div>
      </section>

      <section class="project_process_section">
        <div class="project_process_container">
          <div class="project_process_media">
            <img
              class="project_process_img"
              id="detail-process-img"
              src=""
              alt="Project process demonstration"
            />
          </div>
          <div class="project_process_content">
            <h2 class="project_process_title" id="detail-process-title"></h2>
            <p class="project_process_text" id="detail-process-text"></p>
          </div>
        </div>
      </section>

      <section class="project_result_section">
        <div class="project_result_container">
          <div class="project_result_content">
            <h2 class="project_result_title" id="detail-result-title"></h2>
            <p class="project_result_text" id="detail-result-text"></p>
          </div>
          <div id="detail-result-images" style="display: contents"></div>
        </div>
      </section>
    </main>
    <div id="footer-placeholder"></div>

    <script src="components/projectsData.js" defer></script>
    <script src="components/project_detail.js" defer></script>
    <script src="Script.js" defer></script>
  </body>
</html>
